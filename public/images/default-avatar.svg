<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#764ba2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f093fb;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="faceGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="200" cy="200" r="200" fill="url(#bgGradient)"/>
  
  <!-- Face -->
  <circle cx="200" cy="180" r="80" fill="url(#faceGradient)"/>
  
  <!-- Eyes -->
  <circle cx="180" cy="160" r="8" fill="#1f2937"/>
  <circle cx="220" cy="160" r="8" fill="#1f2937"/>
  <circle cx="182" cy="158" r="3" fill="#ffffff"/>
  <circle cx="222" cy="158" r="3" fill="#ffffff"/>
  
  <!-- Nose -->
  <ellipse cx="200" cy="180" rx="3" ry="6" fill="#e5e7eb"/>
  
  <!-- Mouth -->
  <path d="M 185 200 Q 200 210 215 200" stroke="#1f2937" stroke-width="3" fill="none" stroke-linecap="round"/>
  
  <!-- Hair -->
  <path d="M 140 140 Q 200 100 260 140 Q 250 120 200 110 Q 150 120 140 140" fill="#1f2937"/>
  
  <!-- Body/Shoulders -->
  <ellipse cx="200" cy="320" rx="100" ry="80" fill="#3b82f6"/>
  
  <!-- Shirt -->
  <rect x="150" y="280" width="100" height="120" rx="20" fill="#1e40af"/>
  
  <!-- Tie -->
  <polygon points="200,280 190,290 190,340 200,350 210,340 210,290" fill="#dc2626"/>
  
  <!-- Code Symbol -->
  <text x="200" y="380" font-family="monospace" font-size="24" fill="#ffffff" text-anchor="middle">&lt;/&gt;</text>
  
  <!-- Name Initial -->
  <text x="200" y="50" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#ffffff" text-anchor="middle">S</text>
</svg>