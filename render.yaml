services:
  - type: web
    name: sandipan-portfolio
    env: docker
    repo: https://github.com/Sandip-2005/Sandipan_Bhunia.git
    branch: main
    dockerfilePath: ./Dockerfile
    region: oregon
    plan: free
    buildCommand: |
      composer install --no-dev --optimize-autoloader
      php artisan config:cache
      php artisan route:cache
      php artisan view:cache
    startCommand: apache2-foreground
    envVars:
      - key: APP_NAME
        value: "Sandipan Bhunia Portfolio"
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_URL
        fromService:
          type: web
          name: sandipan-portfolio
          property: host
      - key: SESSION_DRIVER
        value: database
      - key: CACHE_DRIVER
        value: database
      - key: QUEUE_CONNECTION
        value: database
      - key: MAIL_MAILER
        value: log
      - key: DB_CONNECTION
        value: mysql
      - key: DB_HOST
        fromDatabase:
          name: portfolio-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: portfolio-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: portfolio-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: portfolio-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: portfolio-db
          property: password

databases:
  - name: portfolio-db
    databaseName: portfolio
    user: portfolio_user
    region: oregon
    plan: free